name: reusable - lint
on:
  workflow_call:
jobs:
  commits:
    if: github.event_name == 'pull_request'
    uses: natalie-o-perret/.github/.github/workflows/reusable-lint-commits-conventional.yml@main
    permissions:
      pull-requests: read
  go:
    uses: natalie-o-perret/.github/.github/workflows/reusable-lint-files-go.yml@main
  json:
    uses: natalie-o-perret/.github/.github/workflows/reusable-lint-files-json.yml@main
  md:
    uses: natalie-o-perret/.github/.github/workflows/reusable-lint-files-md.yml@main
  yaml:
    uses: natalie-o-perret/.github/.github/workflows/reusable-lint-files-yaml.yml@main
